<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ZGshoop AUTO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <img src="imag/icon.jpg" alt="Логотип" class="logo-img">
        <span class="brand-name">ZGshoop AUTO</span>
    </header>

    <!-- 4 кнопки-секции -->
    <main class="categories">
        <a href="#" class="category-btn">
            <img src="imag/ziza.jpg" alt="Жидкости">
        </a>
        <a href="#" class="category-btn">
            <img src="imag/karik2.jpg" alt="Комплектующие">
        </a>
        <a href="#" class="category-btn">
            <img src="imag/snus.jpg" alt="Жевательный табак">
        </a>
        <a href="#" class="category-btn">
            <img src="imag/NicoByst.jpg" alt="Никобустеры">
        </a>
    </main>

    <!-- Нижняя навигационная панель с картинками-иконками -->
    <nav class="bottom-nav">
        <!-- Замените src на путь к вашим иконкам -->
        <a href="#" class="nav-item">
            <img src="imag/icon_info.png" alt="О магазине" class="nav-icon-img">
            <span class="nav-label">О магазине</span>
        </a>
        <a href="#" class="nav-item">
            <img src="imag/icon_izbrann.png" alt="Избранное" class="nav-icon-img">
            <span class="nav-label">Избранное</span>
        </a>
        <a href="#" class="nav-item active">
            <img src="imag/icon_home.png" alt="Главная" class="nav-icon-img">
            <span class="nav-label">Главная</span>
        </a>
        <a href="#" class="nav-item">
            <img src="imag/icon_corzina.png" alt="Корзина" class="nav-icon-img">
            <span class="nav-label">Корзина</span>
        </a>
        <a href="#" class="nav-item">
            <img src="imag/icon_profil.png" alt="Профиль" class="nav-icon-img">
            <span class="nav-label">Профиль</span>
        </a>
    </nav>

    <footer class="footer">
        <p>© 2026 ZGshoop AUTO</p>
    </footer>
</body>
</html>
